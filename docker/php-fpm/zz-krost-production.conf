[www]
; Production defaults for the app ASG. The upstream php:fpm image defaults to
; pm.max_children=5, which is too small for public traffic and can deadlock the
; site when a dependency stalls.
pm = dynamic
pm.max_children = 30
pm.start_servers = 6
pm.min_spare_servers = 4
pm.max_spare_servers = 10
pm.max_requests = 500

; Bound worst-case request hangs so workers eventually return to the pool.
request_terminate_timeout = 60s
request_slowlog_timeout = 10s
slowlog = /proc/self/fd/2

; Keep worker output in Docker logs for fast SSM debugging.
catch_workers_output = yes
decorate_workers_output = no
