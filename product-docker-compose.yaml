# App tier for production / AWS (external MySQL on the dedicated host).
# Do not use this file for local laptops that need mvc.db — use docker-compose.yaml instead.
#
# Usage (from repo root, after .env has DB_HOST / DB_PASS from Terraform):
#   docker compose -f product-docker-compose.yaml up -d
#
# DB_HOST / PMA_HOST: set both to Terraform output mysql_service_fqdn (e.g. mysql.krost.internal).
# DB_PASS, DB_NAME, DB_USER: match the dedicated MySQL instance (see aws/README.md).

services:
  mvc.php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: 'mvc.php'
    ports:
      - "9000:9000"
    environment:
      MVC_HOST: ${DB_HOST}
      MVC_PASSWORD: ${DB_PASS}
      DB_HOST: ${DB_HOST}
      DB_NAME: ${DB_NAME:-mvc}
      DB_USER: ${DB_USER:-mvc}
      DB_PASS: ${DB_PASS}
      DB_PASSWORD: ${DB_PASS}
      DB_ENGINE: mysqli
      XDEBUG_MODE: ${XDEBUG_MODE:-off}
      XDEBUG_CONFIG: ${XDEBUG_CONFIG:-}
    volumes:
      - ./:/var/www/html/
      - ./php.ini:/usr/local/etc/php/php.ini
    depends_on:
      mvc.redis:
        condition: service_healthy
    networks:
      - mvc.net

  mvc.nginx:
    image: nginx:alpine
    container_name: 'mvc.nginx'
    ports:
      - "8089:80"
    volumes:
      - ./:/var/www/html/
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/lib/letsencrypt:/var/lib/letsencrypt:ro
    depends_on:
      - mvc.php
    networks:
      - mvc.net

  mvc.phpmyadmin:
    image: phpmyadmin:latest
    container_name: 'mvc.phpmyadmin'
    ports:
      - "8090:80"
    environment:
      PMA_HOST: ${PMA_HOST:-${DB_HOST}}
      PMA_PORT: ${PMA_PORT:-3306}
    depends_on:
      - mvc.php
    networks:
      - mvc.net

  mvc.redis:
    image: 'redis:alpine'
    container_name: 'mvc.redis'
    ports:
      - '${FORWARD_REDIS_PORT:-6381}:6379'
    volumes:
      - 'mvc.redis:/data'
    networks:
      - mvc.net
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  mvc.redis:

networks:
  mvc.net:
    driver: bridge
