server {
    #always use public folder as root for security
    root /var/www/html/public;
    #server_name krost.com.au krost.com;

	#listen 80 server;
	#listen [::]:80 server;
	#listen 443 ssl http2;
	#listen [::]:443 ssl http2;

    #ssl_certificate /etc/letsencrypt/live/vvveb.com/fullchain.pem;
    #ssl_certificate_key /etc/letsencrypt/live/vvveb.com/privkey.pem;
	#ssl_session_cache shared:SSL:20m;
    #ssl_session_timeout 10m;
    #ssl_protocols TLSv1 TLSv1.1 TLSv1.2;
    #ssl_prefer_server_ciphers on;
    #ssl_ciphers 'ECDH+AESGCM:ECDH+AES256:ECDH+AES128:DH+3DES:!ADH:!AECDH:!MD5';

	#error_log /var/log/nginx/error.log  debug;

	# Gzip compression
	gzip on;
	gzip_vary on;
	gzip_min_length 256;
	gzip_comp_level 5;
	gzip_proxied any;
	gzip_types
		text/plain
		text/css
		text/xml
		text/javascript
		application/javascript
		application/x-javascript
		application/json
		application/xml
		application/rss+xml
		image/svg+xml;

    #charset utf-8;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";

    # Default cache policy from content-type map
    expires $expires;

    set $skip_cache 0;
    set $cache_uri $request_uri;


    if ($query_string != "") {
        set $skip_cache 1;
        set $cache_uri null;
    }

    # Don't cache uris containing the following segments
    if ($request_uri ~* "/admin/|/user/|/cart/|/feed/|index.php|sitemap(_index)?.xml") {
        set $skip_cache 1;
        set $cache_uri null;
    }

    # Don't use the cache for logged in users or if products in cart
    if ($http_cookie ~* "nocache|cart|user") {
        set $skip_cache 1;
        set $cache_uri null;
    }

    # POST requests and urls with a query string should always go to PHP
    if ($request_method = POST) {
        set $skip_cache 1;
        set $cache_uri null;
    }

    #index index.html index.htm index.php;
    #error_page 404 /index.php;
    error_page 404 /404.html;

    # Static assets (JS, CSS, images, fonts, etc.): long-term cache
    location ~* "\.(?!php)([\w]{2,5})$" {
        expires max;
        add_header Cache-Control "public, immutable";
        log_not_found off;
	    sendfile           on;
	    sendfile_max_chunk 1m;
	    fastcgi_hide_header "Set-Cookie";

        try_files $uri =404;
    }

    # Set maximum request body size for uploads
    client_max_body_size 100M;

    location / {
	    default_type  text/html;
		index index.php index.html index.htm;
		try_files /page-cache/$http_host$cache_uri /page-cache/$http_host$cache_uri/index.html $uri $uri/ /index.php$is_args$args;
		#try_files $uri $uri/ /index.php$is_args$args;

	    # Dynamic and page-cache HTML: do not cache in browser
	    expires 0;
	    add_header Cache-Control "no-cache, no-store, must-revalidate";

	    #cache debug
	    #add_header "uri" $cache_uri;
      }


    location ~ /media/.+?\.php$ {
        deny all;
    }

    location ~ \.php$ {
        #fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
        fastcgi_pass php;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;

        # Do not cache PHP responses in browser
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";

        #uncomment fastcgi_cache to enable fastcgi cache, this should not be necessary
        #unless you set the path to a memory mapped location for even faster cache

        #fastcgi_cache VCACHE;
        fastcgi_cache_bypass $skip_cache;
        fastcgi_no_cache $skip_cache;
        fastcgi_cache_valid 30m;
        #add_header X-VCache $upstream_cache_status;
    }

    location = /favicon.ico {
            expires 7d;
            add_header Cache-Control "public, immutable";
            log_not_found off;
            access_log off;
    }

    location = /robots.txt {
            expires 24h;
            add_header Cache-Control "public, max-age=86400";
            allow all;
            log_not_found off;
            access_log off;
            try_files $uri @robots_php;
    }
    location @robots_php {
            fastcgi_pass php;
            fastcgi_param SCRIPT_FILENAME $realpath_root/index.php;
            fastcgi_param REQUEST_URI /robots.txt;
            include fastcgi_params;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
