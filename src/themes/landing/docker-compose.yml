services:
  krost.npm:
    container_name: krost.npm
    image: node:23.9.0-bookworm
    user: "node"
    working_dir: /home/node/app
    environment:
      - NODE_ENV=development
    entrypoint: ['bash', './nodejs.sh']
    volumes:
      - .:/home/node/app
    ports:
      - 3000:3000
      - 3001:3001
    expose:
      - 8081
      - 3000
      - 3001
    networks:
      krost:
        aliases:
          - krost.npm
networks:
  krost:
    driver: bridge

