<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light d-flex justify-content-center align-items-center" style="height: 100vh; margin: 0;">

  <div class="card shadow-sm p-4" style="max-width: 400px; width: 100%;">
    <div class="card-body" data-v-component-site data-v-component-user data-v-opt-site="{name: KM, description: Ecommerce}" data-v-opt-user="{id: 12}">
      <!--        <h1 class="text-center mb-4" data-v-copy-from="index.html,#element"></h1>-->
      <h1 class="text-center mb-4" data-v-site-name></h1>
      <h1 class="text-center mb-4" data-v-site-description></h1>
      <h1 class="text-center mb-4" data-v-site-etc></h1>
      <div class="alert alert-info text-center" data-v-if-showmessage data-v-message>Message</div>
      <div class="alert alert-danger text-center" data-v-if-showerrors data-v-errors>Errors</div>
      <form method="POST" action="/auth/login">
        <input type="hidden" name="csrf_token">
        <div class="mb-3">
          <label for="email" class="form-label">Email</label>
          <input type="email" class="form-control" id="email" name="email" placeholder="Enter your email" required>
        </div>
        <div class="mb-3">
          <label for="password" class="form-label">Password</label>
          <input type="password" class="form-control" id="password" name="password" placeholder="Enter your password" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">Login</button>
      </form>
      <div class="text-center my-3">
        <span class="text-muted">Or continue with</span>
      </div>
      <div class="d-grid gap-2">
        <a href="/auth/google" class="btn btn-light border d-flex align-items-center justify-content-center gap-2 fw-semibold">
          <svg width="18" height="18" viewBox="0 0 48 48" aria-hidden="true" focusable="false">
            <path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303C33.653 32.657 29.203 36 24 36c-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.27 4 24 4C12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z" />
            <path fill="#FF3D00" d="M6.306 14.691l6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.27 4 24 4 16.318 4 9.656 8.337 6.306 14.691z" />
            <path fill="#4CAF50" d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238C29.143 35.091 26.715 36 24 36c-5.182 0-9.617-3.316-11.283-7.946l-6.523 5.025C9.505 39.556 16.227 44 24 44z" />
            <path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303c-.793 2.239-2.231 4.166-4.084 5.571l.003-.002 6.19 5.238C37.007 38.469 44 33 44 24c0-1.341-.138-2.65-.389-3.917z" />
          </svg>
          <span>Login with Google</span>
        </a>
        <a href="/auth/microsoft" class="btn btn-light border d-flex align-items-center justify-content-center gap-2 fw-semibold">
          <svg width="16" height="16" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <rect x="1" y="1" width="10" height="10" fill="#F25022" />
            <rect x="13" y="1" width="10" height="10" fill="#7FBA00" />
            <rect x="1" y="13" width="10" height="10" fill="#00A4EF" />
            <rect x="13" y="13" width="10" height="10" fill="#FFB900" />
          </svg>
          <span>Login with Microsoft</span>
        </a>
      </div>
    </div>
    <div data-v-copy-from="contact-info.html"></div>
  </div>

  <!-- Bootstrap JS and dependencies -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
