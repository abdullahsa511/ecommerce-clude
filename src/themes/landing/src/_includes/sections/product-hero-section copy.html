<script>
  document.querySelectorAll('[data-bg-src]').forEach(function(el) {
    var src = el.getAttribute('data-bg-src');
    el.style.backgroundImage = 'url(' + src + ')';
    el.classList.add('background-image');
  });
  /* Sequential video playback - combines short videos into one continuous playback */
  (function() {
    var banner = document.querySelector('[data-v-heroproduct-video-collage]');
    if (!banner) return;
    var video = banner.querySelector('video');
    var videos = banner.getAttribute('data-videos');
    if (!video || !videos) return;
    try {
      var urls = JSON.parse(videos);
      if (!urls.length) return;
      var idx = 0;
      video.src = urls[0];
      video.addEventListener('ended', function() {
        idx = (idx + 1) % urls.length;
        video.src = urls[idx];
        video.play();
      });
    } catch (e) {}
  })();
</script>
