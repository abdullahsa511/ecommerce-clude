<div class="th-sidebar-container pr-md-40">
    <form class="th-from-margin th-sidebar-form" id="filter-models-form">
        <div class="th-input-group pl-0 th-border-top">
            <select class="form-control th-choices-select z-index-10"
                name="choose-context-type" id="choose-context-type"
                placeholder="Select Context Type">
            </select>
        </div>
        <!-- Product Category Select -->
        <div class="th-input-group pl-0 @@topClass" id="choose-product-category-container">
            <select class="form-control th-choices-select z-index-10"
                name="product_category" id="choose-product-category"
                placeholder="Product Category">
            </select>
        </div>
        <!-- Item Name Select -->
        <div class="th-input-group pl-0 @@topClass">
            <select class="form-control th-choices-select z-index-10"
                name="name" id="choose-product-name"
                placeholder="Name">
            </select>
        </div>
        <button type="submit" id="filter-models-button" class="th-btn-gray text-capitalize w-100 mt-50">
            <span class="mr-5">
                Filter
            </span>
            <i class="fa-regular fa-filter"></i>
        </button>
    </form>
</div>
