<section id="design-resources">
    <div id="pagination" style="display: none;">
        <div id="current-page"></div>
        <div id="per-page"></div>
        <div id="offset"></div>
        <div id="context"></div>
        <div id="category"></div>
        <div id="model_id"></div>
        <div id="model_name"></div>
        <div id="total"></div>
    </div>
    <div class="container th-container">
        <div class="section-header mb-80">
            <div class=" w-100">
                <div class="th-bredcrum">
                    <div aria-label="breadcrumb">
                        <ol class="breadcrumb">
                            <li class="breadcrumb-item">
                                <a href="/">Home</a>
                            </li>
                            <li class="breadcrumb-item active" aria-current="page">Resources</li>
                        </ol>
                    </div>
                </div>
            </div>
        </div>
        <div class="row">
            <div class="section-body">
                <div class="row">
                    <div class="col-md-12">
                        <div class="th-head-tab-navigation-container d-flex justify-content-center mb-50 p-15">
                            <!-- Flex container for centering -->
                            <ul class="nav nav-tabs d-flex justify-content-between th-center-tab" id="th-tab-navigation"
                                role="tablist">
                                <li class="nav-item " role="presentation">
                                    <button class="nav-link th-tab-color" data-method="loadMoreDesignResourceImages"
                                        data-tab-method="loadImages" data-component="resource-images-tab"
                                        id="images-tab" data-bs-toggle="tab" data-bs-target="#images" type="button"
                                        role="tab" data-route="/resources/images">
                                        IMAGES
                                    </button>
                                </li>

                                <li class="nav-item " role="presentation">
                                    <button class="nav-link th-tab-color" data-method="loadMoreDesignResourceModels"
                                        data-tab-method="loadModels" data-component="resource-models-tab"
                                        data-route="/resources/models" id="models-tab" data-bs-toggle="tab"
                                        data-bs-target="#models" type="button" role="tab">
                                        2D / 3D MODELS
                                    </button>
                                </li>

                                <li class="nav-item " role="presentation">
                                    <button class="nav-link th-tab-color" data-method="loadMoreDesignResourceDocuments"
                                        data-tab-method="loadDocuments" data-component="resource-documents-tab"
                                        data-route="/resources/documents" id="documents-tab"
                                        data-bs-toggle="tab" data-bs-target="#documents" type="button" role="tab">
                                        DOCUMENTS AND GUIDES
                                    </button>
                                </li>

                                <li class="nav-item " role="presentation">
                                    <button class="nav-link th-tab-color" data-method="loadMoreDesignResourceFinishes"
                                        data-tab-method="loadFinishes" data-component="resource-finishes-tab"
                                        data-route="/resources/finishes" id="finishes-tab" data-bs-toggle="tab"
                                        data-bs-target="#finishes" type="button" role="tab">
                                        FINISHES
                                    </button>
                                </li>
                                <li class="nav-item " role="presentation">
                                    <button class="nav-link th-tab-color" data-method="loadMoreDesignResourceTextiles"
                                        data-tab-method="loadTextiles" data-component="resource-textiles-tab"
                                        data-route="/resources/textiles" id="textiles-tab" data-bs-toggle="tab"
                                        data-bs-target="#textiles" type="button" role="tab">
                                        TEXTILES
                                    </button>
                                </li>
                            </ul>
                        </div>

                        <div class="row" id="vue-resource-app">
                            <!-- <ResourceImagePage /> -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>


<style>
    .design-item {
        .th-res-img-wraper img{
            max-height: 213px!important;
            object-fit: contain!important;
        }
    }
</style>
