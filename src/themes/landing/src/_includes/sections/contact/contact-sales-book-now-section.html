<!--============================== Book Now and calender ==============================-->
<section id="book-now" class="position-relative th-section-py" style="scroll-margin-top: 100px;" data-v-component-booknow>
    <div id="booking-vue-app"></div>
</section>
<!--======== End Book Now Section ========-->
<script>
(function () {
    var h = window.__bookNowRestoreHash || window.location.hash || '';
    if (h !== '#book-now' && h.indexOf('#book-now') !== 0) return;
    var offset = 100;
    var el = document.getElementById('book-now');
    if (el) {
        var top = el.getBoundingClientRect().top + window.pageYOffset - offset;
        window.scrollTo(0, Math.max(0, top));
    }
    if (window.__bookNowRestoreHash) {
        history.replaceState(null, '', window.location.pathname + window.location.search + window.__bookNowRestoreHash);
        delete window.__bookNowRestoreHash;
    }
})();
</script>
