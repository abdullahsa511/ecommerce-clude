                  </div>

<script>
  async function initMap() {
    const mapEl = document.getElementById('map');
    const placeAutocompleteEl = document.getElementById('address-input');
    const addressValueEl = document.getElementById('address-value');
    const suggestionsEl = document.getElementById('address-suggestions');
    const toggleAutocompleteEl = document.getElementById('toggle-map');

    if (!mapEl || !placeAutocompleteEl || !addressValueEl || !suggestionsEl) {
      return;
    }

    const { Map, InfoWindow } = await google.maps.importLibrary('maps');
    const { AdvancedMarkerElement } = await google.maps.importLibrary('marker');
    await google.maps.importLibrary('places');

    const map = new Map(mapEl, {
      center: { lat: -25.2744, lng: 133.7751 },
      zoom: 5,
      mapId: 'DEMO_MAP_ID',
      mapTypeControl: false,
    });

    const marker = new AdvancedMarkerElement({ map: null });
    const infoWindow = new InfoWindow();
    let sessionToken = new google.maps.places.AutocompleteSessionToken();
    let lastRequestId = 0;
    let isAutocompleteEnabled = true;

    // টগল টেক্সট আপডেট করার জন্য ফিক্সড ফাংশন
    function updateToggleText() {
      if (!toggleAutocompleteEl) return;
      toggleAutocompleteEl.textContent = isAutocompleteEnabled
        ? `Can't find your address? Enter it manually`
        : `Switch back to address auto-complete`;
    }

    function closeSuggestions() {
      suggestionsEl.innerHTML = '';
      suggestionsEl.classList.add('d-none');
    }

    // সাজেশন সিলেক্ট করার লজিক
    async function selectSuggestion(placePrediction) {
      const place = placePrediction.toPlace();
      await place.fetchFields({ fields: ['displayName', 'formattedAddress', 'location'] });

      const formattedAddress = place.formattedAddress || placeAutocompleteEl.value || '';
      const displayName = place.displayName || 'Selected Place';
      const location = place.location || null;

      placeAutocompleteEl.value = formattedAddress;
      addressValueEl.value = formattedAddress;
      closeSuggestions();
      sessionToken = new google.maps.places.AutocompleteSessionToken();

      if (!location) return;

      map.setCenter(location);
      map.setZoom(16);
      marker.position = location;
      marker.map = map;

      infoWindow.setContent(
        '<strong>' + displayName + '</strong><br />' + (formattedAddress || '')
      );
      infoWindow.open({ anchor: marker, map: map });
    }

    // ইনপুট টাইপ ইভেন্ট লিসেনার
    placeAutocompleteEl.addEventListener('input', async function () {
      const query = placeAutocompleteEl.value.trim();
      addressValueEl.value = query;

      if (!isAutocompleteEnabled) {
        closeSuggestions();
        return;
      }

      if (query.length < 3) {
        closeSuggestions();
        return;
      }

      const requestId = ++lastRequestId;
      try {
        const response = await google.maps.places.AutocompleteSuggestion.fetchAutocompleteSuggestions({
          input: query,
          sessionToken: sessionToken,
          includedRegionCodes: ['au'],
        });

        if (requestId !== lastRequestId) return;

        const suggestions = response?.suggestions || [];
        if (!suggestions.length) {
          closeSuggestions();
          return;
        }

        suggestionsEl.innerHTML = '';
        suggestions.forEach(function (suggestion) {
          const placePrediction = suggestion.placePrediction;
          if (!placePrediction) return;

          const optionButton = document.createElement('button');
          optionButton.type = 'button';
          optionButton.setAttribute('role', 'option');
          optionButton.textContent = placePrediction.text?.text || '';
          optionButton.addEventListener('click', function () {
            selectSuggestion(placePrediction);
          });
          suggestionsEl.appendChild(optionButton);
        });

        if (suggestionsEl.childElementCount > 0) {
          suggestionsEl.classList.remove('d-none');
        } else {
          closeSuggestions();
        }
      } catch (error) {
        closeSuggestions();
      }
    });

    placeAutocompleteEl.addEventListener('blur', function () {
      addressValueEl.value = placeAutocompleteEl.value.trim();
    });

    // ম্যানুয়াল এবং অটোমোড টগল ইভেন্ট লিসেনার (ডুপ্লিকেট রিমুভড ও ক্লিন করা)
    if (toggleAutocompleteEl) {
      updateToggleText();
      toggleAutocompleteEl.addEventListener('click', function (event) {
        event.preventDefault();
        placeAutocompleteEl.focus();
        isAutocompleteEnabled = !isAutocompleteEnabled;
        updateToggleText(); // রিয়েল টাইমে টেক্সট চেইঞ্জ হবে
        sessionToken = new google.maps.places.AutocompleteSessionToken();
        closeSuggestions();
        addressValueEl.value = placeAutocompleteEl.value.trim();
      });
    }

    // ড্রপডাউনের বাইরে ক্লিক করলে ক্লোজ হওয়ার লজিক
    document.addEventListener('click', function (event) {
      if (!suggestionsEl.contains(event.target) && event.target !== placeAutocompleteEl) {
        closeSuggestions();
      }
    });
  }

  window.initMap = initMap;
</script>
<script>
  (function () {
    const form = document.getElementById('request-catalogue-form');
    if (!form) {
      return;
    }

    const actionInput = document.getElementById('recaptcha-action');
    const RECAPTCHA_ACTION = actionInput
      ? String(actionInput.value || '').trim() || 'catalogue_request'
      : 'catalogue_request';
    const siteKeyInput = document.getElementById('recaptcha-site-key');
    const tokenInput = document.getElementById('g-recaptcha-response');
    const recaptchaFeedback = document.getElementById('recaptcha-feedback');
    const siteKey = siteKeyInput ? String(siteKeyInput.value || '').trim() : '';
    const recaptchaEnabled = siteKey !== '';

    if (!recaptchaEnabled) {
      const disclaimer = form.querySelector('.recaptcha-disclaimer');
      if (disclaimer) {
        disclaimer.style.display = 'none';
      }
    }

    if (recaptchaFeedback && recaptchaFeedback.textContent.trim()) {
      recaptchaFeedback.style.display = 'block';
    }

    function showRecaptchaError(message) {
      if (!recaptchaFeedback) {
        return;
      }
      recaptchaFeedback.textContent = message;
      recaptchaFeedback.style.display = message ? 'block' : 'none';
    }

    function setSubmitLoading(visibleSubmitButton, isLoading) {
      if (!visibleSubmitButton) {
        return;
      }
      visibleSubmitButton.dataset.loading = isLoading ? 'true' : 'false';
      visibleSubmitButton.disabled = isLoading;
      const spinner = visibleSubmitButton.querySelector('[data-submit-spinner]');
      if (spinner) {
        spinner.classList.toggle('d-none', !isLoading);
      }
    }

    function loadRecaptchaScript(key) {
      return new Promise(function (resolve, reject) {
        if (window.grecaptcha && typeof window.grecaptcha.execute === 'function') {
          resolve();
          return;
        }

        const existing = document.querySelector('script[data-recaptcha-v3]');
        if (existing) {
          if (existing.getAttribute('data-recaptcha-ready') === '1') {
            resolve();
            return;
          }
          existing.addEventListener('load', function () {
            existing.setAttribute('data-recaptcha-ready', '1');
            resolve();
          });
          existing.addEventListener('error', function () {
            reject(new Error('reCAPTCHA failed to load'));
          });
          return;
        }

        const script = document.createElement('script');
        script.src = 'https://www.google.com/recaptcha/api.js?render=' + encodeURIComponent(key);
        script.async = true;
        script.defer = true;
        script.setAttribute('data-recaptcha-v3', '1');
        script.onload = function () {
          script.setAttribute('data-recaptcha-ready', '1');
          resolve();
        };
        script.onerror = function () {
          reject(new Error('reCAPTCHA failed to load'));
        };
        document.head.appendChild(script);
      });
    }

    function executeRecaptcha(key) {
      return loadRecaptchaScript(key).then(function () {
        return new Promise(function (resolve, reject) {
          window.grecaptcha.ready(function () {
            window.grecaptcha
              .execute(key, { action: RECAPTCHA_ACTION })
              .then(resolve)
              .catch(reject);
          });
        });
      });
    }

    if (recaptchaEnabled) {
      loadRecaptchaScript(siteKey).catch(function () {
        // Preload failure is non-fatal; submit will retry loading.
      });
    }

    form.addEventListener('submit', function (event) {
      const visibleSubmitButton = form.querySelector('button[type="submit"]:not(.d-none)');

      if (!visibleSubmitButton) {
        return;
      }

      if (form.dataset.recaptchaVerified === 'true') {
        setSubmitLoading(visibleSubmitButton, true);
        return;
      }

      if (visibleSubmitButton.dataset.loading === 'true') {
        event.preventDefault();
        return;
      }

      event.preventDefault();
      showRecaptchaError('');

      if (!recaptchaEnabled) {
        form.dataset.recaptchaVerified = 'true';
        form.requestSubmit(visibleSubmitButton);
        return;
      }

      setSubmitLoading(visibleSubmitButton, true);

      executeRecaptcha(siteKey)
        .then(function (token) {
          if (tokenInput) {
            tokenInput.value = token;
          }
          form.dataset.recaptchaVerified = 'true';
          setSubmitLoading(visibleSubmitButton, false);
          form.requestSubmit(visibleSubmitButton);
        })
        .catch(function () {
          setSubmitLoading(visibleSubmitButton, false);
          showRecaptchaError('reCAPTCHA verification failed. Please refresh the page and try again.');
        });
    });
  })();
</script>
