  <style>
    /*
    ============================================================
    KROST — FEATURED PRODUCTS SECTION REDESIGN
    ============================================================
    Dev notes:
    - This file is a standalone mockup of the Featured Products
      section only. Drop the CSS into your stylesheet and the
      HTML into your page template.
    - Replace the placeholder <div class="fp-img-placeholder">
      blocks with real <img> tags pointing to your media paths.
    - All class names are prefixed with "fp-" to avoid conflicts
      with existing stylesheet classes.
    - The section uses your existing .th-container for width
      consistency — see the HTML wrapper comment below.
    ============================================================
    */

    /* ---- Section wrapper ---- */
    .fp-section {
      padding: 60px 0;
      font-family: "Open Sans", sans-serif;
    }

    /* ---- Section header ---- */
    .fp-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .fp-header h2 {
      font-size: 28px;
      font-weight: 600;
      margin: 0 0 10px;
      color: #1a1a1a;
      letter-spacing: -0.02em;
    }

    .fp-header p {
      font-size: 15px;
      color: #6b6b6b;
      margin: 0;
      max-width: 520px;
      margin-left: auto;
      margin-right: auto;
      line-height: 1.6;
    }

    /* ---- 2x2 product grid ---- */
    .fp-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    /* ---- Individual product card ---- */
    .fp-card {
      background: #ffffff;
      border: 1px solid #e8e8e8;
      border-radius: 8px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: box-shadow 0.2s ease, border-color 0.2s ease;
    }

    .fp-card:hover {
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      border-color: #d0d0d0;
    }

    /* ---- Image area ---- */
    .fp-img-wrap {
      position: relative;
      height: 250px;
      overflow: hidden;
      /* background: #f5f5f3; */
    }

    /*
      Replace .fp-img-placeholder with a real <img> tag:
      <img src="/media/Products/image/your-image.webp"
           alt="Product name"
           class="fp-img">
    */
    .fp-img-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      color: #aaa;
      font-family: "Open Sans", sans-serif;
    }

    .fp-img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      transition: transform 0.3s ease;
    }

    .fp-card:hover .fp-img {
      transform: scale(1.02);
    }

    /* ---- Pinboard (+) button ---- */
    .fp-pin {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: #ffffff;
      border: 1px solid #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.15s ease, border-color 0.15s ease;
      z-index: 1;
    }

    .fp-pin:hover {
      background: #1a1a1a;
      border-color: #1a1a1a;
    }

    .fp-pin:hover svg path {
      stroke: #ffffff;
    }

    .fp-pin svg {
      width: 14px;
      height: 14px;
    }

    /* ---- Card body ---- */
    .fp-body {
      padding: 16px 20px 20px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    /* ---- Category tag ---- */
    .fp-tag {
      font-size: 11px;
      color: #888;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      font-weight: 600;
    }

    /* ---- Product name ---- */
    /* .fp-name {
      font-size: 16px;

    /* ---- View product link ---- */
    .fb-link-text{
      display: flex;
      align-items: center;
      gap: 8px;
      transition: opacity .4s ease, text-shadow .4s ease;
      text-shadow: none;
    }

    /* ---- "View All" footer link ---- */
    .fp-footer {
      margin-top: 40px;
      text-align: center;
    }

    .fp-footer a {
      font-size: 14px;
      font-weight: 600;
      color: #1a1a1a;
      text-decoration: none;
      border-bottom: 1px solid #1a1a1a;
      padding-bottom: 2px;
      transition: opacity 0.15s ease;
    }

    .fp-footer a:hover {
      opacity: 0.6;
    }

    /* ---- Responsive: tablet ---- */
    @media (max-width: 900px) {
      .fp-grid {
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }

      .fp-img-wrap {
        height: 180px;
      }
    }

    /* ---- Responsive: mobile ---- */
    @media (max-width: 600px) {
      .fp-section {
        padding: 40px 0;
      }

      .fp-grid {
        grid-template-columns: 1fr;
        gap: 14px;
      }

      .fp-header {
        margin-bottom: 28px;
      }

      .fp-header h2 {
        font-size: 22px;
      }

      .fp-img-wrap {
        height: 200px;
      }
