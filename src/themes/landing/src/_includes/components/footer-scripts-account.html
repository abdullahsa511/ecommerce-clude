<script>
    if(document.getElementById('account-db-active-quotes')) {
(function () {
    const profileInitialsEl = document.querySelector('[data-v-account-profile-initials]');
    const profileUploadEl = document.querySelector('[data-v-account-profile-upload]');

    if (!profileInitialsEl || !profileUploadEl) return;

    const defaultInitials = (profileInitialsEl.textContent || '').trim();
    let previewUrl = null;

    profileUploadEl.addEventListener('change', function (event) {
      const file = event.target.files && event.target.files[0];

      if (!file) {
        profileInitialsEl.textContent = defaultInitials;
        profileInitialsEl.style.backgroundImage = '';
        profileInitialsEl.style.backgroundSize = '';
        profileInitialsEl.style.backgroundPosition = '';
        profileInitialsEl.style.backgroundRepeat = '';
        profileInitialsEl.style.backgroundColor = '';
        return;
      }

      if (!file.type || !file.type.startsWith('image/')) return;

      if (previewUrl) {
        URL.revokeObjectURL(previewUrl);
      }

      previewUrl = URL.createObjectURL(file);
      profileInitialsEl.textContent = '';
      profileInitialsEl.style.backgroundImage = 'url("' + previewUrl + '")';
      profileInitialsEl.style.backgroundSize = 'cover';
      profileInitialsEl.style.backgroundPosition = 'center';
      profileInitialsEl.style.backgroundRepeat = 'no-repeat';
      profileInitialsEl.style.backgroundColor = 'transparent';
    });
  })();
}
</script>
