    function isMobileView() {
      return MOBILE_MQ.matches;
    }

      try {
        return localStorage.getItem(STORAGE_KEY) === "true";
      } catch (e) {
        return false;
      }

      try {
        localStorage.setItem(STORAGE_KEY, "true");

      tutorialShell.classList.remove("is-hidden");

    }

      tutorialShell.classList.remove("is-visible");
      tutorialShell.classList.add("is-hidden");
      tutorialShell.setAttribute("aria-hidden", "true");

      check:    '<svg viewBox="0 0 16 16"><path d="M3 8.5 L6.5 12 L13 4" stroke="currentColor" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>',
      phone:    '<svg viewBox="0 0 24 24" fill="none"><path d="M5 4h3l1.5 4.5L7.5 10a11 11 0 0 0 6 6l1.5-2 4.5 1.5V19a2 2 0 0 1-2 2A16 16 0 0 1 3 6a2 2 0 0 1 2-2z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/></svg>',
      mail:     '<svg viewBox="0 0 24 24" fill="none"><rect x="3" y="5" width="18" height="14" rx="2" stroke="currentColor" stroke-width="1.7"/><path d="M4 7l8 6 8-6" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/></svg>',
      calendar: '<svg viewBox="0 0 24 24" fill="none"><rect x="3" y="5" width="18" height="16" rx="2" stroke="currentColor" stroke-width="1.7"/><path d="M3 9h18M8 3v4M16 3v4" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>',
      video:    '<svg viewBox="0 0 24 24" fill="none"><rect x="3" y="6" width="13" height="12" rx="2" stroke="currentColor" stroke-width="1.7"/><path d="M16 10l5-3v10l-5-3z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/></svg>'
    };
  
    function asset(file) { return ASSET_BASE + file; }
    function esc(s) { return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }
  
    function renderBrowse() {
      var cards = BROWSE_ITEMS.map(function (item) {
        return '' +
          '<div class="product-card">' +
            '<div class="product-card__media">' +
              '<img src="' + asset(item.image) + '" alt="' + esc(item.name) + '" loading="lazy">' +
              '<div class="pin' + (item.pinned ? ' pin--active' : '') + '">' +
                (item.pinned ? '<span class="pin__ring"></span>' : '') +
                '<span class="pin__btn">' + ICONS.plus + '</span>' +
              '</div>' +
            '</div>' +
            '<div class="product-card__label">' + esc(item.name) + '</div>' +
          '</div>';
      }).join("");
  
      return '' +
        '<div class="browse">' +
          '<div class="browse__bar">' +
            '<img class="browse__logo" src="' + asset("krost-logo.png") + '" alt="KROST" loading="lazy">' +
            '<div class="browse__nav">' +
              '<span class="nav-bar"></span>' +
              '<span class="nav-bar nav-bar--sm"></span>' +
              '<span class="pinboard-icon">' +
                '<img src="' + asset("pinboard-icon.png") + '" alt="Pinboard" loading="lazy">' +
                '<span class="pinboard-icon__count">3</span>' +
              '</span>' +
            '</div>' +
          '</div>' +
          '<div class="browse__body">' +
            '<div>' +
              '<div class="browse__title">Task Seating</div>' +
              '<div class="browse__sub">Tap the + on anything you like</div>' +
            '</div>' +
            '<div class="browse__grid">' + cards + '</div>' +
          '</div>' +
        '</div>';
    }
  
    function renderBoard() {
      var rows = PINBOARD_ITEMS.map(function (item) {
        return '' +
          '<div class="pin-row">' +
            '<div class="pin-row__thumb pin-row__thumb--' + item.fit + '">' +
              '<img src="' + asset(item.image) + '" alt="' + esc(item.title) + '" loading="lazy">' +
            '</div>' +
            '<div class="pin-row__info">' +
              '<div class="pin-row__title">' + esc(item.title) + '</div>' +
              '<div class="pin-row__type">' + esc(item.type) + '</div>' +
              '<div class="pin-row__note">+ Add Note</div>' +
            '</div>' +
            '<div class="pin-row__actions">' + ICONS.drag + ICONS.remove + '</div>' +
          '</div>';
      }).join("");
  
      return '' +
        '<div class="board">' +
          '<div class="board__head">' +
            '<div class="board__title">' + esc(PROJECT.boardName) + '</div>' +
            '<span class="pinboard-icon pinboard-icon--on-grey">' +
              '<img src="' + asset("pinboard-icon.png") + '" alt="Pinboard" loading="lazy">' +
              '<span class="pinboard-icon__count">' + PROJECT.itemCount + '</span>' +
            '</span>' +
          '</div>' +
          '<div class="board__list">' + rows + '</div>' +
        '</div>';
    }
  
    function renderSave() {
      return '' +
        '<div class="save">' +
          '<div class="save__title">Save your project</div>' +
          '<div class="project-chip">' +
            '<div class="project-chip__avatar">V</div>' +
            '<div class="project-chip__info">' +
              '<div class="project-chip__name">' + esc(PROJECT.boardName) + '</div>' +
              '<div class="project-chip__meta">' + PROJECT.itemCount + ' items</div>' +
            '</div>' +
            '<div class="project-chip__tag">Project</div>' +
          '</div>' +
          '<div class="save__fields">' +
            '<div class="field field--filled">' + esc(PROJECT.name) + '</div>' +
            '<div class="field field--email">' + esc(PROJECT.email) + '<span class="caret"></span></div>' +
          '</div>' +
          '<button class="save__btn" type="button">Save Project And Continue</button>' +
        '</div>';
    }
  
    function renderQuote() {
      var methods = CONTACT_METHODS.map(function (m) {
        return '' +
          '<div class="method">' +
            '<span class="method__icon">' + (ICONS[m.icon] || "") + '</span>' +
            '<span class="method__label">' + esc(m.label) + '</span>' +
          '</div>';
      }).join("");
  
      return '' +
        '<div class="quote">' +
          '<div class="saved-chip">' +
            '<div class="saved-chip__avatar">V</div>' +
            '<div class="saved-chip__info">' +
              '<div class="saved-chip__name">' + esc(PROJECT.name) + '</div>' +
              '<div class="saved-chip__meta">' + PROJECT.itemCount + ' items \u00b7 Project</div>' +
            '</div>' +
            '<div class="saved-chip__status">' + ICONS.check + 'Saved</div>' +
          '</div>' +
          '<div class="quote__title">Connect with a Krost consultant for a quote</div>' +
          '<div class="quote__methods">' + methods + '</div>' +
        '</div>';
    }
  
    var VISUALS = { browse: renderBrowse, board: renderBoard, save: renderSave, quote: renderQuote };
  
    var root   = document.getElementById("krost-pinboard");
    var device = document.getElementById("kpb-device");
    var elLabel = document.getElementById("kpb-label");
    var elTitle = document.getElementById("kpb-title");
    var elBody  = document.getElementById("kpb-body");
    var elDots  = document.getElementById("kpb-dots");
    var btnBack = document.getElementById("kpb-back");
    var btnNext = document.getElementById("kpb-next");
    var btnClose = document.getElementById("kpb-close");
  
    var step = 0;
    var initialized = false;
  
    function render() {
      var s = STEPS[step];
      var isLast = step === STEPS.length - 1;
  
      device.innerHTML = (VISUALS[s.visual] || function () { return ""; })();
      elLabel.textContent = s.label;
      elTitle.innerHTML = s.titleHtml;
      elBody.innerHTML = s.body.map(function (p) { return "<p>" + p + "</p>"; }).join("");
  
      elDots.innerHTML = STEPS.map(function (_, i) {
        return '<button class="dot' + (i === step ? " dot--active" : "") +
               '" type="button" data-step="' + i + '" aria-label="Step ' + (i + 1) + '"></button>';
      }).join("");
  
      btnBack.style.display = step > 0 ? "" : "none";
      btnNext.textContent = isLast ? "Start Pinning" : "Next";
    }
  
    function close() {
      markTutorialSeen();
      root.classList.add("is-closed");
      hideTutorial();
      if (typeof window.onPinboardClose === "function") { window.onPinboardClose(); }
      document.dispatchEvent(new CustomEvent("krost-pinboard:close"));
    }
  
    function initTutorial() {
      if (initialized) { return; }
      if (isMobileView()) {
        hideTutorial();
        return;
      }
      initialized = true;
      render();
      showTutorial();
    }

    MOBILE_MQ.addEventListener("change", function () {
      if (isMobileView()) {
        hideTutorial();
      }
    });
  
    btnNext.addEventListener("click", function () {
      if (step === STEPS.length - 1) { close(); }
      else { step += 1; render(); }
    });
    btnBack.addEventListener("click", function () {
      if (step > 0) { step -= 1; render(); }
    });
    elDots.addEventListener("click", function (e) {
      var dot = e.target.closest(".dot");
      if (dot) { step = parseInt(dot.getAttribute("data-step"), 10); render(); }
    });
    btnClose.addEventListener("click", close);

    if (document.readyState === "complete") {
      initTutorial();
    } else {
      window.addEventListener("load", initTutorial);
    }
  })();
  </script>
</div>
