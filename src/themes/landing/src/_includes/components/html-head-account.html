  <!-- Suppress passive event listener warnings from lightGallery -->
  <script>
    // Note: Browser violation warnings about non-passive event listeners cannot be
    // completely suppressed via JavaScript as they come from Chrome DevTools' performance monitoring.
    // These warnings are harmless and don't affect functionality.
    // 
    // To reduce warnings, we intercept addEventListener and make touch events passive
    // when not explicitly set to false. Libraries that need preventDefault can opt-out.
    (function () {
      if (typeof EventTarget !== 'undefined') {
        const originalAddEventListener = EventTarget.prototype.addEventListener;
        const passiveTouchEvents = ['touchstart', 'touchmove', 'touchend', 'touchcancel'];

        EventTarget.prototype.addEventListener = function (type, listener, options) {
          if (passiveTouchEvents.includes(type)) {
            // Normalize options to object format
            if (typeof options === 'boolean') {
              options = { capture: options };
            } else if (typeof options === 'undefined' || options === null) {
              options = {};
            }

            // Make passive by default, but allow explicit opt-out
            // Libraries like lightGallery that need preventDefault should set passive: false
            if (options.passive === undefined) {
              options.passive = true;
            }
          }
          return originalAddEventListener.call(this, type, listener, options);
        };
      }
    })();
  </script>
