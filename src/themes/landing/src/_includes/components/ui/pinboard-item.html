<div class="th-pinboard-item">
  <div class="row">
    <div class="col-md-4">
      <div class="th-img-container th-pinboard-item-img border">
        <img
          src="/img/dashboard-pinboard/pinboard-img-01.png"
          class="img-fluid rounded-start"
          alt="..."
        />
      </div>
    </div>
    <div class="col-md-8">
      <div class="th-pinboard-item-info">
        <div class="card-body position-relative">
          <div class="th-pinboard-info-body">
            <h4 class="fw-bold font-wight-700">Product</h4>
            <h4 class="card-title font-wight-700">
              Miro Task Chair - Black Fabric Seat / Black Mesh Black
            </h4>

            <div class="th-pinboard-item-circle">
              <div class="th-circle-items">
                <img
                  src="/img/product-detail/second circle.png"
                  class="rounded-circle border border-light"
                  alt="Option 1"
                />
                <img
                  src="/img/product-detail/second circle.png"
                  class="rounded-circle border border-light"
                  alt="Option 2"
                />

                <img
                  src="/img/product-detail/third circle.png"
                  class="rounded-circle border border-light"
                  alt="Option 3"
                />
                <img
                  src="/img/product-detail/first circle.png"
                  class="rounded-circle border border-light"
                  alt="Option 4"
                />
              </div>
            </div>

            <!-- Quote -->
            <div class="th-pinboard-item-edit">
              <div
                class="th-pinboard-item-blockquote border d-flex justify-content-between align-items-start"
              >
                <blockquote class="th-blockquote-txt">
                  <p class="fst-italic">
                    "Lorem Ipsum Dolor Sit Amet, Consectetur Adipiscing Elit.
                    Sed Do Eiusmod Tempor Incididunt Ut Labore Et Dolore Magna
                    Aliqua."
                  </p>
                </blockquote>
                <div class="th-blockquote-edit-icon text-end">
                  <button class="btn">
                    <i class="fa-solid fa-pencil"></i>
                  </button>
                </div>
              </div>
            </div>

            <!-- Comment Box -->
            <input type="text" class="" placeholder="Add A Comment" />

            <!-- Buttons -->
            <div class="th-doc-actions th-pinbord-item-comment">
              <a href="contact.html" class="th-btn-gray text-capitalize mr-10">
                <span class="mr-5">Accept Quote</span>
              </a>
              <a href="contact.html" class="th-btn-primary text-capitalize">
                <span class="mr-5">Accept Quote</span>
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>
    <button
        type="button"
        class="btn-close position-absolute p-2"
        aria-label="Close"
      ></button>
  </div>
</div>
