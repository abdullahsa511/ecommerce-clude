<div class="swiper-slide gr-bg6">
    <img src="@@imgSrc" />
    <div class="slider-content gr-bg5" data-ani="slideinleft" data-ani-delay=".1s">
        <h4 class="title font-white" data-ani="slideinleft" data-ani-delay=".2s">@@title</h4>
        <h6 class="th-title-20 font-white pb-15" data-ani="slideinleft" data-ani-delay="0.3s">@@subtitle</h6>
        <div class="btn-group" data-ani="slideinleft" data-ani-delay="0.4s">
            <div class="position-relative">
                <a href="@@buttonLink" class="th-btn-outline text-capitalize">
                    <span class="mr-5">Contact Sales</span>
                    <i class="fa-regular fa-arrow-up degree-60"></i>
                </a>
            </div>
        </div>
    </div>
</div>
