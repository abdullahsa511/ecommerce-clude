<div class="th-member-wrapper col-sm-6 col-lg-3">
  <div class="th-member" data-bg-src="@@memberImage">
    <div class="th-member-icons">
      <span><i class="fa-solid fa-calendar"></i></span>
      <span><i class="fa-solid fa-envelope"></i></span>
      <span><i class="fa-solid fa-phone"></i></span>
    </div>
    <div class="th-member-info-container gr-bg6">
      <div class="th-member-info">
        <p class="th-member-name">@@memberName</p>
        <p class="th-member-position">@@memberPosition</p>
      </div>
    </div>
  </div>
</div>
