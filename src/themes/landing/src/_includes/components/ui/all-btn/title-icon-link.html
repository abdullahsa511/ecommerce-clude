<div class="th-link">
  <h6 class="th-title-20 font-weight-700">@@if(typeof link_text !== 'undefined') { @@link_text } @@if(typeof link_text === 'undefined') { "Take a Tour" }</h6>
  @@if(typeof arrow_icon === 'undefined' || arrow_icon !== 'none') {
    <div class="th-link-icon">
      <i class="fa-regular fa-arrow-right"></i>
    </div>
  }
</div>
