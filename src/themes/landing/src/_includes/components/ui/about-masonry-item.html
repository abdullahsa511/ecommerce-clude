
<div class="th-masonry-grid-item grid-col-span-@@span @@class"
        style="transform: translateY(@@top px);padding-top:@@padding-top px">
    <div class="th-item-img">
        <img src="@@img" alt="Product 1" />
    </div>
    <div class="th-product-info-wrapper">
        <div class="th-item-info th-mt-15">
            <h3 class="withOutArrow">@@heading</h3>
            <p class="th-item-description">@@des</p>
            <p class="th-category-items">
                @@if(typeof scategories !== 'undefined'){
                    @@loop("./span.html", scategories)
                }
            </p>
        </div>
        @@include("./all-btn/icon-link.html", {
            "link_text": "View all @@heading"
        })
    </div>
</div>
