<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="/media/favicon.ico">
    <title>409 - Page Not Found</title>
    <style>
        body {
            margin: 0;
            font-family: Inter, Nunito, sans-serif;
            font-size: 1rem;
            font-weight: 400;
            line-height: 1.6;
            color: #212529;
            text-align: left;
            background-color: #f9f8f9;
        }

        section {
            display: block
        }

        .error-page {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding-top: 250px;
            width: 100%;
            min-height: 70vh;
            background-position: calc(50% + 40px) calc(50% - 130px);
            background-repeat: no-repeat;
            background-size: 400px 370px;
            color: #717784;
            text-align: center;
        }
        h1{
            font-size: 25px;
            font-weight: 600;
            margin: 0px
        }

        .error-page p {
            font-size: 20px;
            font-weight: 600;
            color: #889191;
            margin-top: 0px;
            margin-bottom: 14px;
        }

        .p-button {
            box-shadow: 0 0 6px #34357e1b;
            font-weight: 600;
            color: #fff;
            background: #262626;
            border: 1px solid #262626;
            padding: .4rem 1.2rem;
            font-size: 1rem;
            transition: background-color .2s, color .2s, border-color .2s, box-shadow .2s;
            border-radius: 5px;
        }

        a {
            text-decoration: none;
        }
    </style>
</head>


<body>
    <section class="error-page" style="background-image: url('/media/error/409.png');">
        <h1>Resource Conflict</h1>
        <p>It seems there was a conflict with your request</p>
        <a class="p-button k-button" href="/">Return to Dashboard</a>
    </section>

</body>

</html>
