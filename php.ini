session.auto_start = Off
session.use_only_cookies = On
session.use_cookies = On
session.use_trans_sid = Off
session.use_strict_mode=On
session.cookie_httponly = On
session.cookie_lifetime=0
session.gc_maxlifetime = 9999998
; Lax is required for OAuth (e.g. Google) return navigations: Strict cookies are not sent on cross-site top-level redirects.
session.cookie_samesite="Lax"
session.sid_length="48"
session.sid_bits_per_character="6"
session.hash_function="sha256"
register_globals = Off
default_charset = UTF-8
mysql.connect_timeout = 10
memory_limit = 612M
max_execution_time = 60
upload_max_filesize = 65M
post_max_size = 100M
max_file_uploads = 50
allow_url_fopen = On
;extension=curl
;extension=gd
;extension=zip
;extension=xml
;display_errors = 0
;error_reporting = E_NONE
;display_errors = 1
;error_reporting = E_ALL
;extension=dom
;extension=tokenizer
;extension=xmlwriter

log_errors = On
error_log = /var/www/html/storage/logs/php_errors.log
error_reporting = E_ALL
display_errors = Off


[xdebug]
xdebug.mode=debug
xdebug.client_host=host.docker.internal
xdebug.client_port=9005
xdebug.start_with_request=yes
xdebug.max_nesting_level=512
xdebug.var_display_max_children=128
xdebug.var_display_max_data=512
xdebug.var_display_max_depth=3
